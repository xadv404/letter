<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Letter Recon</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%233b82f6'/%3E%3Cstop offset='100%25' stop-color='%2322d3ee'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-family='system-ui' font-weight='800' font-size='16'%3EL%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/icons.css" />
</head>
<body>
  <div class="ambient"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="grid-bg"></div></div>
  <div class="app app--full">
    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <a href="index.html" class="btn-icon" title="Retour" aria-label="Retour au dashboard">
            <svg class="ico" aria-hidden="true"><use href="icons.svg#ico-back"/></svg>
          </a>
          <div>
            <div class="page-title">Paramètres</div>
            <div class="page-subtitle">Crawl</div>
          </div>
        </div>
      </header>
      <div class="content">
        <form id="settings-form">
          <div class="settings-section">
            <div class="settings-section-header"><h2>Crawl</h2><p>Découverte des URLs</p></div>
            <div class="settings-body">
              <div class="field-row">
                <div class="field"><label for="depth">Profondeur max</label><input id="depth" name="depth" type="number" min="1" max="10" /></div>
                <div class="field"><label for="pages">Pages / domaine</label><input id="pages" name="page_limit" type="number" min="10" max="500" /></div>
                <div class="field"><label for="workers">Workers</label><input id="workers" name="workers" type="number" min="1" max="64" /></div>
              </div>
              <div class="field"><label for="delay">Délai (ms)</label><input id="delay" name="delay_ms" type="number" min="50" max="5000" /></div>
            </div>
          </div>
          <div class="btn-row">
            <button class="btn-ctrl primary" type="submit"><svg class="ico" aria-hidden="true"><use href="icons.svg#ico-save"/></svg> Enregistrer</button>
            <span id="save-msg" class="save-msg"></span>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    LetterAPI.getConfig().then(function (c) {
      document.getElementById("depth").value = c.depth;
      document.getElementById("pages").value = c.page_limit;
      document.getElementById("workers").value = c.workers;
      document.getElementById("delay").value = c.delay_ms;
    });
    document.getElementById("settings-form").addEventListener("submit", function (e) {
      e.preventDefault();
      var cfg = {
        depth: parseInt(document.getElementById("depth").value, 10),
        page_limit: parseInt(document.getElementById("pages").value, 10),
        workers: parseInt(document.getElementById("workers").value, 10),
        delay_ms: parseInt(document.getElementById("delay").value, 10),
      };
      LetterAPI.putConfig(cfg).then(function () {
        var msg = document.getElementById("save-msg");
        msg.innerHTML = '<span class="save-ok"><svg class="ico" aria-hidden="true"><use href="icons.svg#ico-check"/></svg> Enregistré</span>';
        setTimeout(function () { msg.innerHTML = ""; }, 2500);
      }).catch(function (err) { alert(err.message); });
    });
  </script>
</body>
</html>
